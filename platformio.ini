; Wilderness QR Checkpoint — two-board PlatformIO project
; Environments: nano (ATmega328P), esp32cam (AI-Thinker), native (host tests)

[platformio]
default_envs = nano, esp32cam

; ── Arduino Nano (ATmega328P) ────────────────────────────────────
[env:nano]
platform  = atmelavr
board     = nanoatmega328
framework = arduino
lib_deps  = adafruit/RTClib
lib_ldf_mode = deep+
monitor_speed = 115200
build_src_filter =
    +<nano/>
    -<esp32cam/>

; ── AI-Thinker ESP32-CAM ─────────────────────────────────────────
[env:esp32cam]
platform  = espressif32
board     = esp32cam
framework = arduino
lib_deps  =
    adafruit/RTClib
    SD_MMC
    FS
lib_ldf_mode = deep+
board_build.partitions = huge_app.csv
build_flags =
    -I $PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/FS/src
build_src_filter =
    +<esp32cam/>
    -<nano/>

; ── Native host tests (Google Test + RapidCheck) ─────────────────
[env:native]
platform = native
test_build_src = yes
build_src_filter =
    +<*>
    -<esp32cam/main.cpp>
lib_deps =
    google/googletest@^1.15.2
    https://github.com/emil-e/rapidcheck.git
lib_compat_mode = off
build_flags =
    -std=c++17
    -I test/test_native
    -I .pio/libdeps/native/rapidcheck/extras/gtest/include
    -Wl,-subsystem,console
test_framework = googletest
