; PlatformIO Configuration for Wilderness QR Checkpoint Device

[platformio]
default_envs = esp32cam

; ─── ESP32-CAM (AI-Thinker) Target ───────────────────────────────────────────
[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv
build_flags =
    -DBOARD_HAS_PSRAM
lib_deps =
    adafruit/RTClib@^2.1.4

; ─── Native Test Environment (Google Test + RapidCheck) ──────────────────────
[env:native]
platform = native
build_flags =
    -std=c++17
    -DNATIVE_TEST
    -I include
    -I .pio/libdeps/native/rapidcheck/extras/gtest/include
    -Wl,-subsystem,console
build_unflags = -mwindows
lib_deps =
    google/googletest@^1.15.2
    https://github.com/emil-e/rapidcheck.git
test_framework = googletest
test_build_src = yes
build_src_filter = +<*> -<main.ino>
